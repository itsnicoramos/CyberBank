<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyberBank</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>CyberBank</h1>
    <span id="session"></span>
  </header>

  <main>
    <section id="auth">
      <div class="card">
        <h2>Log in</h2>
        <form id="loginForm">
          <label>Account number<input name="accountNumber" type="number" required /></label>
          <label>4-digit PIN<input name="pin" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" required /></label>
          <button>Log in</button>
        </form>
      </div>

      <div class="card">
        <h2>Open an account</h2>
        <form id="createForm">
          <label>Full name<input name="name" required /></label>
          <label>4-digit PIN<input name="pin" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" required /></label>
          <button>Create</button>
        </form>
      </div>
    </section>

    <section id="dashboard" hidden>
      <div class="card balance-card">
        <h2>Balance</h2>
        <p class="balance">$<span id="balance">0.00</span></p>
        <button id="logoutBtn" class="ghost">Log out</button>
      </div>

      <div class="card">
        <h2>Deposit</h2>
        <form id="depositForm" class="row">
          <input name="amount" type="number" step="0.01" min="0.01" placeholder="Amount" required />
          <button>Deposit</button>
        </form>
      </div>

      <div class="card">
        <h2>Withdraw</h2>
        <form id="withdrawForm" class="row">
          <input name="amount" type="number" step="0.01" min="0.01" placeholder="Amount" required />
          <button>Withdraw</button>
        </form>
      </div>

      <div class="card">
        <h2>Transfer</h2>
        <form id="transferForm" class="row">
          <input name="to" type="number" placeholder="To account" required />
          <input name="amount" type="number" step="0.01" min="0.01" placeholder="Amount" required />
          <button>Send</button>
        </form>
      </div>

      <div class="card">
        <h2>Activity</h2>
        <ul id="history"></ul>
      </div>
    </section>

    <p id="status" role="status" aria-live="polite"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
